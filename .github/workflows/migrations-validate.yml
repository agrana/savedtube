name: Supabase migrations

on:
  pull_request:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/config.toml'
      - '.github/workflows/migrations-validate.yml'
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/config.toml'
      - '.github/workflows/migrations-validate.yml'
  workflow_dispatch:

jobs:
  validate:
    name: Validate migrations
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase database
        run: supabase start -x studio,api,imgproxy,storage-api,realtime,edge-runtime,logflare,vector,inbucket

      - name: Reset local DB and apply migrations
        run: supabase db reset

      - name: Stop local Supabase
        if: always()
        run: supabase stop --no-backup

  deploy:
    name: Apply migrations to production
    runs-on: ubuntu-latest
    needs: validate
    if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch' }}
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply migrations to production Supabase
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "${SUPABASE_DB_URL}" ]; then
            echo "Missing GitHub secret SUPABASE_DB_URL."
            echo "Set it to the Supabase direct Postgres connection string, including sslmode=require."
            exit 1
          fi

          supabase db push --include-all --db-url "${SUPABASE_DB_URL}"
